name: Validate and Normalize Attached SVG

on:
  issue_comment:
    types: [created, edited]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate and Normalize
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const path = require('path');
            
            const comment = context.payload.comment.body;
            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const invalidLabel = 'invalid-icon';
            
            // Regex to match the new GitHub attachment format
            const regex = /src="(https:\/\/github\.com\/user-attachments\/assets\/[a-f0-9-]+)"/g;
            let match;
            const matches = [];

            while ((match = regex.exec(comment)) !== null) {
              matches.push(match[1]);
            }
            
            if (matches.length > 0) {
              const stageDir = path.join(process.env.RUNNER_TEMP, 'icon_stage');
              if (!fs.existsSync(stageDir)) fs.mkdirSync(stageDir);
              
              for (const url of matches) {
                // Name it icon.svg so the normalization script processes it correctly
                const filePath = path.join(stageDir, 'icon.svg');
                
                // 1. Download the file
                execSync(`curl -L "${url}" -o "${filePath}"`);
                
                // 2. Run your existing normalization script
                try {
                  execSync(`node script/normalize-icons.mjs "${stageDir}" "${stageDir}" --clean`);
                  
                  // Success: remove label and notify
                  await github.rest.issues.removeLabel({
                    owner, repo, issue_number, name: invalidLabel
                  }).catch(() => {});
                  
                  await github.rest.issues.createComment({
                    owner, repo, issue_number,
                    body: "✅ **Validation Successful:** The SVG has been normalized and is ready to be included."
                  });
                } catch (error) {
                  // Failure: add label and notify
                  await github.rest.issues.addLabels({
                    owner, repo, issue_number, labels: [invalidLabel]
                  });
                  await github.rest.issues.createComment({
                    owner, repo, issue_number,
                    body: `⚠️ **Validation Failed:** The icon could not be normalized. Please ensure it is a valid SVG. Error: ${error.message}`
                  });
                  return;
                }
              }
            }