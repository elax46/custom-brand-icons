name: Validate and Normalize Attached SVG

on:
  issue_comment:
    types: [created, edited]
  schedule:
    - cron: '0 0 * * *' # Esegue il controllo ogni giorno a mezzanotte

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate and Normalize
        uses: actions/github-script@v9
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const path = require('path');
            
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const invalidLabel = 'invalid-icon';

            if (context.eventName === 'schedule') {
              const { data: issues } = await github.rest.issues.listForRepo({ owner, repo, labels: invalidLabel, state: 'open' });
              for (const issue of issues) {
                const threshold = 7 * 24 * 60 * 60 * 1000;
                const lastUpdate = new Date(issue.updated_at).getTime();
                if ((Date.now() - lastUpdate) > threshold) {
                  await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: 'closed' });
                  await github.rest.issues.createComment({ 
                    owner, repo, issue_number: issue.number, 
                    body: "This issue has been closed due to inactivity." 
                  });
                }
              }
              return;
            }
            // ----------------------------------------------------

            const comment = context.payload.comment;
            const issue_number = context.issue.number;
            
            
            const regex = /src="(https:\/\/github\.com\/user-attachments\/assets\/[a-f0-9-]+)"/g;
            let match;
            const urls = [];
            while ((match = regex.exec(comment.body)) !== null) {
              urls.push(match[1]);
            }
            
            if (urls.length === 0) return;

            const stageDir = path.join(process.env.RUNNER_TEMP, 'icon_stage');
            if (fs.existsSync(stageDir)) fs.rmSync(stageDir, { recursive: true });
            fs.mkdirSync(stageDir, { recursive: true });
            
            for (const url of urls) {
              const filePath = path.join(stageDir, 'icon.svg');
              
            
              execSync(`curl -L "${url}" -o "${filePath}"`);
              
              try {
               
                const stdout = execSync(`node script/normalize-icons.mjs "${stageDir}" "${stageDir}" --clean`, { encoding: 'utf8' });
                console.log("Script output:", stdout);
                
                
                const stats = fs.statSync(filePath);
                if (stats.size === 0) throw new Error("Normalization resulted in an empty file.");

                
                const { data: existingComments } = await github.rest.issues.listComments({ owner, repo, issue_number });
                const hasSuccess = existingComments.some(c => c.body.includes("✅ **Validation Successful"));
                
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name: invalidLabel }).catch(() => {});
                
                if (!hasSuccess) {
                  await github.rest.issues.createComment({ 
                    owner, repo, issue_number, 
                    body: "✅ **Validation Successful:** The SVG has been normalized and is ready to be included." 
                  });
                }
              } catch (error) {
                console.error("Normalization Error:", error.message);
                
                
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [invalidLabel] }).catch(() => {});
                
                await github.rest.issues.createComment({ 
                  owner, repo, issue_number, 
                  body: `⚠️ **Validation Failed:** The icon is invalid or could not be normalized. \n\nDetails: ${error.message}` 
                });
                
                return;
              }
            }