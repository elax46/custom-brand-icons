name: Validate and Normalize Attached SVG

on:
  issue_comment:
    types: [created, edited]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate and Normalize
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const path = require('path');
            
            const comment = context.payload.comment;
            const commentBody = comment.body;
            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const invalidLabel = 'invalid-icon';
            
            // Extract image URLs from the current comment only
            const regex = /src="(https:\/\/github\.com\/user-attachments\/assets\/[a-f0-9-]+)"/g;
            let match;
            const urls = [];
            while ((match = regex.exec(commentBody)) !== null) {
              urls.push(match[1]);
            }
            
            if (urls.length === 0) return; // Exit if no images in this specific comment

            const stageDir = path.join(process.env.RUNNER_TEMP, 'icon_stage');
            if (!fs.existsSync(stageDir)) fs.mkdirSync(stageDir);
            
            for (const url of urls) {
              const filePath = path.join(stageDir, 'icon.svg');
              execSync(`curl -L "${url}" -o "${filePath}"`);
              
              try {
                execSync(`node script/normalize-icons.mjs "${stageDir}" "${stageDir}" --clean`);
                
                // Check if already validated to avoid spam
                const { data: existingComments } = await github.rest.issues.listComments({ owner, repo, issue_number });
                const hasSuccess = existingComments.some(c => c.body.includes("✅ **Validation Successful"));
                
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name: invalidLabel }).catch(() => {});
                
                if (!hasSuccess) {
                  await github.rest.issues.createComment({ 
                    owner, repo, issue_number, 
                    body: "✅ **Validation Successful:** The SVG has been normalized and is ready to be included." 
                  });
                }
              } catch (error) {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [invalidLabel] }).catch(() => {});
                // Optional: avoid comment spam here too if preferred
              }
            }