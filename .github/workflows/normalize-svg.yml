name: Normalize SVG Icons (PR → dev)

on:
  pull_request:
    branches:
      - dev
    types: [opened, synchronize, reopened]

jobs:
  normalize:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:

      # 1️⃣ Checkout PR correctly (NO ref override!)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Install ImageMagick (if needed)
      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      # 5️⃣ Normalize SVG only
      - name: Normalize SVG icons
        run: |
          set -e
          echo "🧹 Running normalization..."
          npm run clean:vrt
          echo "✅ Normalization completed"

      # 6️⃣ Commit changes only if needed
      - name: Commit normalized SVGs
        run: |
          # Evita loop se il commit è già del bot
          if [[ "${{ github.actor }}" == "github-actions[bot]" ]]; then
            echo "ℹ️ Triggered by bot, skipping commit to avoid loop"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add icon-svg

          if git diff --staged --quiet; then
            echo "ℹ️ No SVG changes"
            exit 0
          fi

          git commit -m "chore: normalize SVG icons [skip ci]"
          git push
