name: Normalize SVG Icons (PR → dev)

on:
  pull_request:
    branches:
      - dev
    types: [opened, synchronize, reopened]

jobs:
  normalize:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:

      # 1️⃣ Checkout the PR branch (full fetch)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Install project dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Get only the SVG files changed in this PR
      - name: Get changed SVG files
        id: changed_files
        run: |
          # Fetch the base branch to compare changes
          git fetch origin ${{ github.base_ref }}
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt

          echo "All changed files in the PR:"
          cat changed_files.txt

          # Keep only SVG files inside icon-svg/
          grep '^icon-svg/.*\.svg$' changed_files.txt > changed_svg.txt || true

          if [ ! -s changed_svg.txt ]; then
            echo "No SVG files changed."
            echo "svg_changed=false" >> $GITHUB_OUTPUT
          else
            echo "SVG files to normalize:"
            cat changed_svg.txt
            echo "svg_changed=true" >> $GITHUB_OUTPUT
          fi

      # 5️⃣ Normalize only the changed SVG files
      - name: Normalize changed SVG icons
        if: steps.changed_files.outputs.svg_changed == 'true'
        run: |
          while read file; do
            echo "🧹 Normalizing $file"
            npm run clean:vrt -- "$file"
          done < changed_svg.txt

      # 6️⃣ Commit normalized SVGs back to the PR branch
      - name: Commit normalized SVGs
        if: steps.changed_files.outputs.svg_changed == 'true'
        run: |
          # Skip commit if the bot triggered the workflow to avoid infinite loops
          if [[ "${{ github.actor }}" == "github-actions[bot]" ]]; then
            echo "ℹ️ Triggered by bot, skipping commit to avoid loop"
            exit 0
          fi

          # Configure git author for the bot
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add icon-svg

          if git diff --staged --quiet; then
            echo "ℹ️ No SVG changes detected after normalization"
            exit 0
          fi

          git commit -m "chore: normalize SVG icons [skip ci]"

          # Push changes back to the PR branch (works even from detached HEAD)
          git push origin HEAD:${{ github.head_ref }}
