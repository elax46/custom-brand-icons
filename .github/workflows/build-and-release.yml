name: Build Custom Brand Icons

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Build icons
      - name: Build icons
        run: |
          set -e

          if [ ! -f custom-icons-builder.cjs ]; then
            echo "❌ custom-icons-builder.cjs not found!"
            exit 1
          fi

          echo "🚀 Running builder..."
          node custom-icons-builder.cjs

          if [ ! -f dist/custom-brand-icons.js ]; then
            echo "❌ Build failed: dist/custom-brand-icons.js not generated"
            exit 1
          fi

          echo "✅ Build completed successfully"

      # 5️⃣ Commit dist changes (solo se cambiato)
      - name: Commit dist changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dist

          if git diff --staged --quiet; then
            echo "ℹ️ No changes in dist"
            exit 0
          fi

          git commit -m "chore: update dist build [ci skip]"
          git push origin HEAD:main

      # 6️⃣ Upload artifact
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-brand-icons-dist
          path: dist
